name: Deploy

on:
  push:
    branches:
      - main

env:
  GCP_PROJECT_ID: gen-lang-client-0791944342
  GCP_REGION: northamerica-northeast1
  ARTIFACT_REGISTRY_REPO: event-creator
  IMAGE_NAME: app

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.SUPABASE_PROD_URL }}
      JWT_SECRET: ${{ secrets.JWT_SECRET_PROD }}
      # See ci.yml's test job for why these are here - same reasoning, prod secrets instead of QA.
      GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
      GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
      DROPBOX_OAUTH_CLIENT_ID: ${{ secrets.DROPBOX_OAUTH_CLIENT_ID }}
      DROPBOX_OAUTH_CLIENT_SECRET: ${{ secrets.DROPBOX_OAUTH_CLIENT_SECRET }}
      ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Run Alembic migrations (Supabase prod, event_creator schema)
        run: uv run alembic upgrade head

      - name: Run pytest
        run: uv run pytest

      - name: Run mypy
        run: uv run mypy app tests

  deploy-prod:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      # JWT_SECRET, ENCRYPTION_KEY, the two OAuth client *secrets*, and REDIS_URL are
      # intentionally absent here: all five are wired below via --set-secrets from GCP Secret
      # Manager (`jwt-secret-prod`, `encryption-key-prod` shared with the Host per R4/R6;
      # `google-oauth-client-secret-prod`/`dropbox-oauth-client-secret-prod` new to this service;
      # `redis-url-prod` new in Slice R8, backing the Celery broker/backend for `app.worker` -
      # client secrets/connection strings don't belong in a plaintext env-vars-file readable via
      # `gcloud run services describe`, unlike the client *ids* below, which aren't confidential).
      - name: Write Cloud Run env vars file
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_PROD_URL }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          DROPBOX_OAUTH_CLIENT_ID: ${{ secrets.DROPBOX_OAUTH_CLIENT_ID }}
        run: |
          cat > /tmp/cloud-run-env.yaml <<EOF
          DATABASE_URL: "${DATABASE_URL}"
          GOOGLE_OAUTH_CLIENT_ID: "${GOOGLE_OAUTH_CLIENT_ID}"
          DROPBOX_OAUTH_CLIENT_ID: "${DROPBOX_OAUTH_CLIENT_ID}"
          EOF

      - name: Build image
        run: |
          docker build \
            -t ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/${{ env.IMAGE_NAME }}:latest \
            .

      - name: Push image
        run: |
          docker push ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/${{ env.IMAGE_NAME }}:latest

      - name: Deploy to Cloud Run Prod
        run: |
          # --timeout=3600 (Cloud Run's max): the live SSE processing-progress stream
          # (GET /api/v1/processing-runs/{id}/sse, Slice R8) is a long-held request for the life
          # of a run - the default ~300s timeout would cut it off mid-stream on a slow run.
          gcloud run deploy event-creator-prod \
            --image=${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --region=${{ env.GCP_REGION }} \
            --project=${{ env.GCP_PROJECT_ID }} \
            --env-vars-file=/tmp/cloud-run-env.yaml \
            --set-secrets=JWT_SECRET=jwt-secret-prod:latest,ENCRYPTION_KEY=encryption-key-prod:latest,GOOGLE_OAUTH_CLIENT_SECRET=google-oauth-client-secret-prod:latest,DROPBOX_OAUTH_CLIENT_SECRET=dropbox-oauth-client-secret-prod:latest,REDIS_URL=redis-url-prod:latest \
            --allow-unauthenticated \
            --timeout=3600 \
            --quiet
